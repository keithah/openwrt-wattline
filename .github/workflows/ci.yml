name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -count=1
      - name: Package behavior tests
        run: |
          set -eu
          for test in \
            package/tests/firewall-sync_test.sh \
            package/tests/vpn-firewall-repair_test.sh \
            package/tests/provisioning_test.sh \
            package/tests/luci_contract_test.sh \
            package/tests/gl_contract_test.sh \
            package/tests/feed-migrate-test.sh \
            package/tests/release-readiness_test.sh \
            package/tests/rtl8761b-artifacts_test.sh \
            package/tests/rtl8761b-driver_test.sh \
            package/tests/rtl8761b-lifecycle_test.sh; do
            sh "$test"
          done
          node package/tests/luci_behavior_test.js
          node package/tests/power_loss_behavior_test.js
      - name: Build product packages
        run: make -C package all
      - name: Release inventory
        run: sh package/tests/release-inventory_test.sh package/out 0.1.4
