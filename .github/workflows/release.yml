name: Release

# Tag a release to trigger:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./... -count=1

      - name: Package behavior tests
        run: |
          set -eu
          for test in \
            package/tests/firewall-sync_test.sh \
            package/tests/provisioning_test.sh \
            package/tests/luci_contract_test.sh \
            package/tests/gl_contract_test.sh \
            package/tests/rtl8761b-artifacts_test.sh \
            package/tests/rtl8761b-driver_test.sh \
            package/tests/rtl8761b-lifecycle_test.sh; do
            sh "$test"
          done
          node package/tests/luci_behavior_test.js
          node package/tests/power_loss_behavior_test.js

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build ipks + opkg feed index
        run: make -C package VERSION=${{ steps.ver.outputs.version }} feed

      - name: Verify release inventory
        run: sh package/tests/release-inventory_test.sh package/out ${{ steps.ver.outputs.version }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            package/out/*.ipk
            package/out/Packages
            package/out/Packages.gz

      - name: Publish opkg feed to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          ver="${{ steps.ver.outputs.version }}"
          sh package/mkindex.sh package/out "${GITHUB_REPOSITORY}"
          tmp="$(mktemp -d)"
          cp package/out/*.ipk package/out/Packages package/out/Packages.gz \
             package/out/index.html package/out/.nojekyll "$tmp"/
          cd "$tmp"
          git init -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "opkg feed: wattline ${ver}"
          git push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
